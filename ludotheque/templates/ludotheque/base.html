<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ludothèque{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">SAÉ Ludothèque</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="{% url 'liste_auteurs' %}">Auteurs</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'liste_categories' %}">Catégories</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'liste_jeux' %}">Jeux</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'liste_joueurs' %}">Joueurs</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'liste_commentaires' %}">Commentaires</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container bg-white p-4 rounded shadow-sm">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
